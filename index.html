<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON-LEDGER // SECURE EXCHANGE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(15, 15, 18, 0.9);
            --accent: #00d4ff; /* Tech Blue */
            --text: #ffffff;
            --border: #222;
            --danger: #ff3e3e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            letter-spacing: 6px;
            font-weight: bold;
            color: var(--accent);
            background: linear-gradient(180deg, #111 0%, #050505 100%);
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 2px; /* Sharp corners for IRON feel */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .full-width { grid-column: 1 / -1; }

        h2 { 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            margin-bottom: 20px; 
            color: #888; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            outline: none;
        }

        button {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--accent);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--accent);
            color: #000;
        }

        #wallet-display { font-size: 1.2rem; color: var(--accent); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header>IRON-LEDGER // ENCRYPTED_TRADING_NODE</header>

<div id="auth-section" class="container">
    <div class="panel full-width">
        <h2>AUTHENTICATION_REQUIRED</h2>
        <input type="text" id="username" placeholder="IDENTIFIER">
        <input type="password" id="password" placeholder="SECURITY_KEY">
        <div style="display: flex; gap: 15px;">
            <button onclick="auth('login')">ESTABLISH_LINK</button>
            <button onclick="auth('register')">CREATE_IDENTITY</button>
        </div>
        <p id="auth-msg" style="color: var(--danger); font-size: 0.8rem;"></p>
    </div>
</div>

<div id="main-section" class="container hidden">
    <div class="panel">
        <h2>LEDGER_BALANCE</h2>
        <div id="wallet-display">SYNCHRONIZING...</div>
        <button onclick="logout()" style="margin-top: 30px; border-color: var(--danger); color: var(--danger);">TERMINATE_SESSION</button>
    </div>

    <div class="panel">
        <h2>EXECUTE_TRANSACTION</h2>
        <label style="font-size: 0.7rem; color: #555;">SOURCE</label>
        <select id="from-curr"><option value="USD">USD</option></select>
        <label style="font-size: 0.7rem; color: #555;">DESTINATION</label>
        <select id="to-curr"></select>
        <input type="number" id="amount" placeholder="VOLUME">
        <button onclick="executeTrade()">COMMIT_TO_LEDGER</button>
    </div>

    <div class="panel full-width">
        <h2>MARKET_VOLATILITY_MONITOR</h2>
        <canvas id="marketChart" height="100"></canvas>
    </div>
</div>

<script>
    const API_BASE = "https://currencytrader-production.up.railway.app";
    
    let chart;
    let chartData = { labels: [], datasets: [{ label: 'USD/INR INDEX', borderColor: '#00d4ff', data: [], tension: 0.1 }] };

    async function request(path, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        };
        if (body) options.body = JSON.stringify(body);
        return fetch(`${API_BASE}${path}`, options);
    }

    async function auth(type) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const res = await request(`/api/auth/${type}`, 'POST', { username: u, password: p });
        const data = await res.json();
        
        if (res.ok) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            initDashboard();
        } else {
            document.getElementById('auth-msg').innerText = "ALERT: " + (data.error || data.message);
        }
    }

    async function logout() {
        await request('/api/auth/logout', 'POST');
        location.reload();
    }

    function initDashboard() {
        updateWallet();
        updateRates();
        initChart();
        setInterval(updateRates, 5000); 
    }

    async function updateWallet() {
        const res = await request('/api/wallet');
        const data = await res.json();
        const display = document.getElementById('wallet-display');
        display.innerHTML = data.map(w => `<div>[${w.currency_code}] >> ${parseFloat(w.balance).toFixed(2)}</div>`).join('');
    }

    async function updateRates() {
        const res = await request('/api/rates');
        const data = await res.json();
        const toSelect = document.getElementById('to-curr');
        
        if (data.length > 0) {
            const currentRate = parseFloat(data[0].rate);
            const time = new Date().toLocaleTimeString();
            
            if (chartData.labels.length > 15) {
                chartData.labels.shift();
                chartData.datasets[0].data.shift();
            }
            chartData.labels.push(time);
            chartData.datasets[0].data.push(currentRate);
            chart.update();

            if (toSelect.options.length === 0) {
                data.forEach(r => {
                    let opt = document.createElement('option');
                    opt.value = r.to_currency;
                    opt.innerHTML = r.to_currency;
                    toSelect.appendChild(opt);
                });
            }
        }
    }

    async function executeTrade() {
        const payload = {
            from: document.getElementById('from-curr').value,
            to: document.getElementById('to-curr').value,
            amount: document.getElementById('amount').value
        };
        const res = await request('/api/trade', 'POST', payload);
        if (res.ok) {
            alert("SUCCESS: TRANSACTION SEALED IN LEDGER");
            updateWallet();
        } else {
            const data = await res.json();
            alert("FAILURE: " + data.error);
        }
    }

    function initChart() {
        const ctx = document.getElementById('marketChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: { 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: '#111' }, ticks: { color: '#444' } },
                    x: { grid: { display: false }, ticks: { color: '#444' } }
                } 
            }
        });
    }
</script>
</body>
</html>
