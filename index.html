<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON-LEDGER // DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #252525;
            --input-bg: #1e1e1e;
            --accent-green: #00e676;
            --accent-red: #ff5252;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Sidebar / Wallet Section */
        .sidebar {
            width: 320px;
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .wallet-card {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .currency-label { color: var(--text-dim); font-size: 0.9rem; }
        .currency-value { font-weight: bold; letter-spacing: 1px; }

        .trade-inputs label { font-size: 0.7rem; color: #666; text-transform: uppercase; display: block; margin-bottom: 5px; }

        input, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .buy { background: var(--accent-green); color: #000; }
        .sell { background: var(--accent-red); color: #fff; }

        /* Main Content Section */
        .content { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        .chart-panel, .history-panel {
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { text-align: left; color: #555; padding-bottom: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
        .green { color: var(--accent-green); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <div class="header-row">
            <h3 id="user-title">Wallet (user)</h3>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div id="wallet-list">
            <div class="wallet-card"><span class="currency-label">🇮🇳 INR</span><span class="currency-value">0.00</span></div>
            <div class="wallet-card"><span class="currency-label">🇺🇸 USD</span><span class="currency-value">0.00</span></div>
        </div>

        <div class="trade-inputs">
            <label>Amount</label>
            <input type="number" id="trade-amount" placeholder="0.00">
            
            <label>Target Currency</label>
            <select id="target-currency"></select>

            <div class="btn-group">
                <button class="btn buy" onclick="executeTrade('BUY')">BUY</button>
                <button class="btn sell" onclick="executeTrade('SELL')">SELL</button>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="chart-panel">
            <canvas id="mainChart" height="150"></canvas>
        </div>

        <div class="history-panel">
            <h3>Recent Transactions</h3>
            <table>
                <thead>
                    <tr><th>Time</th><th>Pair</th><th>Sold</th><th>Bought</th><th>Rate</th></tr>
                </thead>
                <tbody id="history-rows"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://currencytrader-production.up.railway.app";
    let chart;

    async function request(path, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
        if (body) options.body = JSON.stringify(body);
        return fetch(`${API_BASE}${path}`, options);
    }

    async function init() {
        // Fetch User Info
        const me = await request('/api/auth/me');
        if (!me.ok) { window.location.href = "login.html"; return; }
        const userData = await me.json();
        document.getElementById('user-title').innerText = `Wallet (${userData.username})`;

        updateDashboard();
        setInterval(updateDashboard, 5000);
    }

    async function updateDashboard() {
        // 1. Update Wallet
        const wRes = await request('/api/wallet');
        const wallets = await wRes.json();
        document.getElementById('wallet-list').innerHTML = wallets.map(w => `
            <div class="wallet-card">
                <span class="currency-label">${w.currency_code}</span>
                <span class="currency-value">${parseFloat(w.balance).toFixed(2)}</span>
            </div>
        `).join('');

        // 2. Update Rates & Chart
        const rRes = await request('/api/rates');
        const rates = await rRes.json();
        if (rates.length > 0) updateChart(rates[0].rate);

        // Populate dropdown once
        const sel = document.getElementById('target-currency');
        if (sel.options.length === 0) {
            rates.forEach(r => {
                let opt = document.createElement('option');
                opt.value = r.to_currency; opt.text = `${r.to_currency} - Exchange`;
                sel.add(opt);
            });
        }

        // 3. Update History
        const hRes = await request('/api/history');
        const history = await hRes.json();
        document.getElementById('history-rows').innerHTML = history.map(h => `
            <tr>
                <td>${new Date(h.created_at).toLocaleTimeString()}</td>
                <td>${h.from_currency} → ${h.to_currency}</td>
                <td>${parseFloat(h.amount).toFixed(2)}</td>
                <td class="green">+${parseFloat(h.converted_amount).toFixed(2)}</td>
                <td>${parseFloat(h.rate).toFixed(4)}</td>
            </tr>
        `).join('');
    }

    function updateChart(newRate) {
        const time = new Date().toLocaleTimeString();
        if (!chart) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [time], datasets: [{ 
                    label: 'Market Rate', data: [newRate], 
                    borderColor: '#00e676', backgroundColor: 'rgba(0, 230, 118, 0.1)', fill: true, tension: 0.4 
                }]},
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        } else {
            if (chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(newRate);
            chart.update();
        }
    }

    async function executeTrade(type) {
        const amount = document.getElementById('trade-amount').value;
        const to = document.getElementById('target-currency').value;
        const res = await request('/api/trade', 'POST', { from: 'USD', to, amount });
        if (res.ok) alert("Transaction Confirmed");
        else alert("Transaction Failed");
        updateDashboard();
    }

    async function logout() { await request('/api/auth/logout', 'POST'); location.reload(); }

    init();
</script>
</body>
</html>
