<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON-LEDGER // V.1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #141414;
            --accent: #00ff9d; /* Neon Cyber Green */
            --text: #e0e0e0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            letter-spacing: 5px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            position: relative;
        }

        .panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--accent);
            border-left: 2px solid var(--accent);
        }

        .full-width { grid-column: 1 / -1; }

        h2 { font-size: 1rem; color: var(--accent); margin-bottom: 15px; }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            outline: none;
            box-sizing: border-box;
        }

        button {
            border: 1px solid var(--accent);
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        #wallet-display { font-size: 1.2rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>IRON-LEDGER // CORE_ACCESS</header>

<div id="auth-section" class="container">
    <div class="panel full-width">
        <h2>[USER_AUTHENTICATION]</h2>
        <input type="text" id="username" placeholder="ID_IDENTIFIER">
        <input type="password" id="password" placeholder="SECURE_KEY">
        <div style="display: flex; gap: 10px;">
            <button onclick="auth('login')">LOGIN</button>
            <button onclick="auth('register')">REGISTER</button>
        </div>
        <p id="auth-msg" style="font-size: 0.8rem; margin-top: 10px;"></p>
    </div>
</div>

<div id="main-section" class="container hidden">
    <div class="panel">
        <h2>[WALLET_DATA]</h2>
        <div id="wallet-display">SYNCING...</div>
        <button onclick="logout()" style="margin-top: 20px; border-color: #ff3e3e; color: #ff3e3e;">DISCONNECT</button>
    </div>

    <div class="panel">
        <h2>[TRANSACTION_ENTRY]</h2>
        <select id="to-curr"></select>
        <input type="number" id="amount" placeholder="VOLUME (USD)">
        <button onclick="executeTrade()">COMMIT_TRANSACTION</button>
    </div>

    <div class="panel full-width">
        <h2>[MARKET_INDEX_STREAM]</h2>
        <canvas id="marketChart" height="100"></canvas>
    </div>
</div>

<script>
    // YOUR RAILWAY BACKEND URL
    const API_BASE = "https://currencytrader-production.up.railway.app";
    
    let chart;
    let chartData = { labels: [], datasets: [{ label: 'USD/INR', borderColor: '#00ff9d', data: [], tension: 0.3 }] };

    async function request(path, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include' // Needed for cross-domain sessions
        };
        if (body) options.body = JSON.stringify(body);
        return fetch(`${API_BASE}${path}`, options);
    }

    async function auth(type) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const res = await request(`/api/auth/${type}`, 'POST', { username: u, password: p });
        if (res.ok) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            initDashboard();
        } else {
            const data = await res.json();
            document.getElementById('auth-msg').innerText = "ERROR: " + (data.error || "FAILED");
        }
    }

    async function logout() {
        await request('/api/auth/logout', 'POST');
        location.reload();
    }

    function initDashboard() {
        updateWallet();
        updateRates();
        initChart();
        setInterval(updateRates, 5000); 
    }

    async function updateWallet() {
        const res = await request('/api/wallet');
        if (res.ok) {
            const data = await res.json();
            document.getElementById('wallet-display').innerHTML = data.map(w => 
                `<div>> ${w.currency_code}: ${parseFloat(w.balance).toFixed(2)}</div>`
            ).join('');
        }
    }

    async function updateRates() {
        const res = await request('/api/rates');
        if (!res.ok) return;
        const data = await res.json();
        const toSelect = document.getElementById('to-curr');
        
        if (data.length > 0) {
            const currentRate = parseFloat(data[0].rate);
            if (chartData.labels.length > 10) {
                chartData.labels.shift();
                chartData.datasets[0].data.shift();
            }
            chartData.labels.push(new Date().toLocaleTimeString());
            chartData.datasets[0].data.push(currentRate);
            chart.update();

            if (toSelect.options.length === 0) {
                data.forEach(r => {
                    let opt = document.createElement('option');
                    opt.value = r.to_currency;
                    opt.innerHTML = "EXCHANGE TO: " + r.to_currency;
                    toSelect.appendChild(opt);
                });
            }
        }
    }

    async function executeTrade() {
        const payload = {
            from: 'USD',
            to: document.getElementById('to-curr').value,
            amount: document.getElementById('amount').value
        };
        const res = await request('/api/trade', 'POST', payload);
        if (res.ok) {
            alert("SUCCESS: DATA COMMITTED TO SUPABASE");
            updateWallet();
        } else {
            const data = await res.json();
            alert("FAILURE: " + data.error);
        }
    }

    function initChart() {
        const ctx = document.getElementById('marketChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: { 
                scales: { 
                    y: { grid: { color: '#222' }, ticks: { color: '#00ff9d' } },
                    x: { ticks: { color: '#444' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
